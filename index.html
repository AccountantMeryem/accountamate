<section id="contact" class="section contact-wrapper">
  <h2>Get in Touch</h2>
  <p class="contact-subtext">Have a question or need help? Send a message or reach out directly.</p>

  <div class="contact-container">

    <!-- Form -->
    <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST" class="contact-form">

      <div class="form-row">
        <input type="text" name="name" placeholder="Your Name" required>
        <input type="email" name="email" placeholder="Your Email" required>
      </div>

      <textarea name="message" placeholder="How can we help you?" rows="6" required></textarea>

      <button type="submit" class="btn-primary">Send Message</button>
    </form>

    <!-- Contact Info -->
    <div class="contact-info">
      <h3>Contact Details</h3>

      <p><strong>Email:</strong><br>
      <a href="mailto:meryemyuksel@live.com">meryemyuksel@live.com</a></p>

      <p><strong>Phone:</strong><br>
      <a href="tel:13219468885">(321) 946-8885</a></p>

      <div class="contact-note">
        <p>We typically respond within 24 hours.</p>
      </div>
    </div>

  </div>
</section>
